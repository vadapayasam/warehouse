<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{page.description}">
  <link rel="canonical" href="{page.canonical_url}">
  <title>{page.title}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700;8..60,800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0e1014;--bg-elevated:#141821;--bg-card:#1a1e26;--bg-accent:#1f2430;--text:#f2f4f8;--text-secondary:#9aa0ab;--text-muted:#5c6370;--border:#242833;--border-light:#2e3544;--accent:#ff6b35;--accent-muted:#ff8a5c;--accent-glow:#ff6b3533;--accent-2:#3b82f6;--accent-2-muted:#60a5fa;--success:#4ade80;--warning:#fbbf24;--error:#f87171;--font-serif:'Source Serif 4',Georgia,serif;--font-mono:'IBM Plex Mono',monospace;
    }
    *,*:before,*:after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-serif);background:var(--bg);color:var(--text);line-height:1.65;font-size:17px;-webkit-font-smoothing:antialiased}
    .container{max-width:760px;margin:0 auto;padding:0 24px}
    header.site{padding:48px 0 32px;border-bottom:1px solid var(--border);margin-bottom:40px}
    .masthead-label{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:12px}
    .masthead-label .dot{display:inline-block;width:6px;height:6px;background:var(--accent);border-radius:50%;margin-right:8px;vertical-align:middle}
    h1{font-weight:800;font-size:36px;line-height:1.15;letter-spacing:-0.5px;margin-bottom:16px}
    .deck{font-size:20px;line-height:1.5;color:var(--text-secondary);font-weight:400;margin-bottom:24px}
    .meta-row{display:flex;flex-wrap:wrap;gap:16px 32px;font-family:var(--font-mono);font-size:12px;color:var(--text-muted)}
    .meta-row span{display:flex;align-items:center;gap:6px}
    .meta-row .accent{color:var(--accent-muted)}
    .section{margin-bottom:48px}
    h2{font-weight:700;font-size:24px;line-height:1.25;margin:0 0 20px;padding-bottom:12px;border-bottom:2px solid var(--bg-accent)}h2 .num{font-family:var(--font-mono);font-weight:500;font-size:13px;color:var(--text-muted);margin-right:8px;text-transform:uppercase;letter-spacing:0.5px}
    h3{font-weight:700;font-size:19px;margin:28px 0 12px;color:var(--text)}
    p{margin-bottom:16px}
    .lead{font-size:19px;color:var(--text-secondary);margin-bottom:24px}
    .insight-box{background:linear-gradient(135deg,var(--bg-accent)0%, rgba(255,107,53,0.04)100%);border-left:3px solid var(--accent);padding:20px 24px;margin:24px 0;border-radius:0 8px 8px 0}
    .insight-box h4{font-family:var(--font-mono);font-size:13px;text-transform:uppercase;letter-spacing:0.8px;color:var(--accent-muted);margin-bottom:10px}
    .insight-box p:last-child{margin-bottom:0}
    ul,ol{margin:0 0 20px;padding-left:22px}
    li{margin-bottom:10px}
    li::marker{color:var(--accent)}
    .product-card{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:24px;margin-bottom:24px;transition:border-color .2s}
    .product-card:hover{border-color:var(--border-light)}
    .product-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:16px}
    .product-title{font-weight:700;font-size:18px;margin:0}
    .product-meta{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);margin-top:6px}
    .badge{display:inline-block;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.8px;padding:3px 10px;border-radius:4px;background:var(--bg-accent);border:1px solid var(--border);white-space:nowrap}
    .badge.accent{color:var(--accent);border-color:rgba(255,107,53,.3)}
    .badge.blue{color:var(--accent-2);border-color:rgba(59,130,246,.3)}
    .product-body p:last-child{margin-bottom:0}
    .pull-quote{font-style:italic;font-size:20px;line-height:1.6;color:var(--text-secondary);border-left:3px solid var(--accent);padding-left:20px;margin:24px 0;text-align:left}
    .pull-quote cite{font-style:normal;display:block;margin-top:8px;font-size:13px;color:var(--text-muted);font-family:var(--font-mono)}
    table{width:100%;border-collapse:collapse;margin:20px 0;font-size:15px}
    thead{display:none}
    tr{border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;gap:16px}
    td:first-child{font-weight:600;font-size:15px}
    td:last-child{font-family:var(--font-mono);font-size:13px;color:var(--accent-muted);text-align:right;flex-shrink:0}
    a{color:var(--accent-2-muted);text-decoration:none;border-bottom:1px solid rgba(96,165,250,.25)}
    a:hover{border-bottom-color:var(--accent-2-muted)}
    .final-score{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:32px;text-align:center;margin:40px 0}
    .final-score h2{border:none;padding:0;margin:0 0 12px}
    .score-value{font-family:var(--font-mono);font-size:48px;font-weight:600;color:var(--accent);line-height:1}
    .score-label{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:8px}
    footer{margin-top:60px;padding:24px 0;border-top:1px solid var(--border);font-family:var(--font-mono);font-size:12px;color:var(--text-muted);text-align:center}
    footer a{color:var(--text-muted);border:none}
    @media(min-width:640px){.container{padding:0 32px}h1{font-size:44px}.deck{font-size:22px}}
  </style>
</head>
<body>
  <header class="site">
    <div class="container">
      <div class="masthead-label"><span class="dot"></span>{page.publication_label}</div>
      <h1>{page.title}</h1>
      <p class="deck">{page.deck}</p>
      <div class="meta-row">
        <span><span class="accent">Week</span> {week.number}</span>
        <span><span class="accent">Period</span> {week.period}</span>
        <span><span class="accent">Products</span> {analysis.product_count}</span>
      </div>
    </div>
  </header>
  <main class="container">
    {content}
  </main>
  <footer>
    <div class="container">
      <p>{footer.text}</p>
      <p>{footer.attribution}</p>
    </div>
  </footer>
</body>
</html>
