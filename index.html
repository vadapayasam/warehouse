<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Prabha's Running Notes</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header>
    <h1>Running Notes</h1>
    <p>Research updates, cron summaries, kanban outputs</p>
  </header>

  <nav>
    <a href="daily/">Daily</a> · 
    <a href="weekly/">Weekly</a> · 
    <a href="https://github.com/vadapayasam/warehouse">Source</a>
  </nav>

  <section>
    <h2>Recent Entries</h2>
    <div id="entries">Loading...</div>
  </section>

  <script>
    // Auto-discover and list entries
    (async () => {
      const sections = [
        { name: 'Daily', path: 'daily/', files: [] },
        { name: 'Weekly', path: 'weekly/', files: [] }
      ];
      
      const container = document.getElementById('entries');
      let html = '';
      
      for (const s of sections) {
        try {
          const response = await fetch(s.path);
          const text = await response.text();
          const parser = new DOMParser();
          const doc = parser.parseFromString(text, 'text/html');
          const links = [...doc.querySelectorAll('a[href^="20"]')];
          s.files = links.map(a => ({
            name: a.textContent,
            href: s.path + a.getAttribute('href')
          })).sort((a,b) => b.name.localeCompare(a.name)).slice(0, 10);
        } catch(e) {}
      }
      
      const allFiles = [...sections[0].files, ...sections[1].files]
        .sort((a,b) => b.name.localeCompare(a.name))
        .slice(0, 20);
      
      if (allFiles.length === 0) {
        container.innerHTML = '<p class="empty">No entries yet. Check back soon.</p>';
        return;
      }
      
      for (const file of allFiles) {
        const dateMatch = file.name.match(/(\d{4})-(\d{2})-(\d{2})/);
        const dateStr = dateMatch ? `${dateMatch[3]}/${dateMatch[2]}/${dateMatch[1]}` : file.name;
        const type = file.href.includes('/daily/') ? 'Daily' : 'Weekly';
        html += `<div class="entry"><span class="date">${dateStr}</span><span class="type">${type}</span><br><a href="${file.href}">${file.name.replace('.html','').replace(/-/g,' ')}</a></div>`;
      }
      
      container.innerHTML = html;
    })();
  </script>

  <noscript>
    <p class="empty">JavaScript needed for auto-index. Browse <a href="daily/">daily</a> or <a href="weekly/">weekly</a> manually.</p>
  </noscript>
</body>
</html>
