<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uxcurry Reports</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background: #0a0a0a;
            color: #e0e0e0;
            line-height: 1.6;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #666; margin-bottom: 40px; }
        .reports { display: grid; gap: 15px; }
        .report {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            border-left: 3px solid #4ecdc4;
        }
        .date { color: #888; font-size: 0.85rem; margin-bottom: 5px; }
        .title { font-size: 1.1rem; color: #fff; }
        .status {
            margin-top: 40px;
            padding: 20px;
            background: #111;
            border-radius: 8px;
            border: 1px solid #333;
        }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4ecdc4;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <h1>uxcurry Reports</h1>
    <p class="subtitle">Weekly research drops and agent outputs</p>
    <div class="reports">
        <div class="report">
            <div class="date">May 15, 2026</div>
            <div class="title">Test Report — GitHub Pages Deployed ✓</div>
        </div>
    </div>
    <div class="status">
        <span class="status-dot"></span>
        System online — awaiting cron integration
    </div>
</body>
</html>
