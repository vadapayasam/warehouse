<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatPay — UX/UI Analysis v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .screenshot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 0.75rem;
        }
        .gradient-text {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">
    <div class="max-w-4xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="mb-8">
            <h1 class="text-3xl font-bold mb-2 gradient-text">WhatPay App Analysis</h1>
            <p class="text-slate-400">Captured via iosef — 6 unique screenshots showing full user flow</p>
        </header>

        <!-- Screenshots -->
        <section class="mb-8">
            <h2 class="text-lg font-semibold mb-4 text-slate-300">App Flow Screenshots</h2>
            <div class="screenshot-grid">
                <div class="glass-card rounded-lg p-3 text-center">
                    <img src="whatpay_01_launch.png" alt="Launch Screen" class="w-full rounded mb-2">
                    <span class="text-xs text-slate-500 mono">01_launch</span>
                </div>
                <div class="glass-card rounded-lg p-3 text-center">
                    <img src="whatpay_02_home.png" alt="Home Screen" class="w-full rounded mb-2">
                    <span class="text-xs text-slate-500 mono">02_home</span>
                </div>
                <div class="glass-card rounded-lg p-3 text-center">
                    <img src="whatpay_03_detail.png" alt="Detail View" class="w-full rounded mb-2">
                    <span class="text-xs text-slate-500 mono">03_detail</span>
                </div>
                <div class="glass-card rounded-lg p-3 text-center">
                    <img src="whatpay_04_scroll.png" alt="Scroll State" class="w-full rounded mb-2">
                    <span class="text-xs text-slate-500 mono">04_scroll</span>
                </div>
                <div class="glass-card rounded-lg p-3 text-center">
                    <img src="whatpay_05_add.png" alt="Add Screen" class="w-full rounded mb-2">
                    <span class="text-xs text-slate-500 mono">05_add</span>
                </div>
                <div class="glass-card rounded-lg p-3 text-center">
                    <img src="whatpay_06_back.png" alt="Back Navigation" class="w-full rounded mb-2">
                    <span class="text-xs text-slate-500 mono">06_back</span>
                </div>
            </div>
        </section>

        <!-- Meta -->
        <footer class="text-sm text-slate-600 mono">
            Generated: 2026-05-17 | Device: iPhone 16 Pro | OS: iOS 18.x
        </footer>
    </div>
</body>
</html>
