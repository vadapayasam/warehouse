<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Left — UI/UX Review</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: #0d0d0d;
            color: #fff;
            padding: 40px 20px;
        }
        h1 { font-size: 2rem; margin-bottom: 8px; font-weight: 600; }
        .subtitle { color: #888; margin-bottom: 40px; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .screen {
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s;
        }
        .screen:hover { transform: scale(1.02); }
        .screen img {
            width: 100%;
            height: auto;
            display: block;
        }
        .label {
            padding: 12px 16px;
            font-size: 0.875rem;
            color: #aaa;
        }
        .back { display: inline-block; color: #3b82f6; text-decoration: none; margin-bottom: 20px; }
    </style>
</head>
<body>
    <a href="/warehouse/" class="back">← Back to warehouse</a>
    <h1>Time Left</h1>
    <p class="subtitle">Countdown progress tracker — 6 unique screenshots</p>
    
    <div class="gallery">
        <div class="screen">
            <img src="screenshots/01.png" alt="Main list view">
            <div class="label">01 — Main Countdowns (Today, Month, Year)</div>
        </div>
        <div class="screen">
            <img src="screenshots/02.png" alt="Main list alternate">
            <div class="label">02 — Countdowns Overview</div>
        </div>
        <div class="screen">
            <img src="screenshots/03.png" alt="Scrolled list">
            <div class="label">03 — Scrolled List View</div>
        </div>
        <div class="screen">
            <img src="screenshots/04.png" alt="Another scroll position">
            <div class="label">04 — Extended Scroll Position</div>
        </div>
        <div class="screen">
            <img src="screenshots/05.png" alt="Settings or add area">
            <div class="label">05 — Settings / Navigation Area</div>
        </div>
        <div class="screen">
            <img src="screenshots/06.png" alt="Add countdown view">
            <div class="label">06 — Add Countdown View</div>
        </div>
    </div>
</body>
</html>
